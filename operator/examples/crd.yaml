# AppHealth CRD - install first
# Generated from: make manifests (config/crd/bases/example.com_apphealths.yaml)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apphealths.example.com
spec:
  group: example.com
  names:
    kind: AppHealth
    listKind: AppHealthList
    plural: apphealths
    singular: apphealth
  scope: Namespaced
  versions:
