# Minimal my-app for testing the AppHealth operator.
# Deploy with: kubectl apply -f examples/my-app.yaml
# Ensures Deployment + Service named "my-app" in default namespace serve GET /info with {"email":"..."}.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: app
          image: python:3-alpine
          command:
            - python
            - -c
            - |
              from http.server import HTTPServer, BaseHTTPRequestHandler
              import json
              class H(BaseHTTPRequestHandler):
                def do_GET(self):
                  if self.path == '/info':
                    self.send_response(200)
                    self.send_header('Content-Type', 'application/json')
                    self.end_headers()
                    self.wfile.write(json.dumps({'email': 'p@gmail.com'}).encode())
                  else:
                    self.send_response(404)
                    self.end_headers()
                def log_message(self, *args): pass
              HTTPServer(('', 8080), H).serve_forever()
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: my-app
  namespace: default
spec:
  selector:
    app: my-app
  ports:
    - port: 80
      targetPort: 8080
