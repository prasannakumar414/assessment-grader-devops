# ServiceAccount for the operator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-health-operator
  namespace: system
---
# ClusterRole: read Deployments, Services, Pods; full access to AppHealth CR
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: app-health-operator-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["example.com"]
    resources: ["apphealths"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["example.com"]
    resources: ["apphealths/status", "apphealths/finalizers"]
    verbs: ["get", "update", "patch"]
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-health-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: app-health-operator-role
subjects:
  - kind: ServiceAccount
    name: app-health-operator
    namespace: system
