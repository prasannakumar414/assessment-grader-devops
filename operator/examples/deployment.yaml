# Operator Deployment - update image to your registry
apiVersion: v1
kind: Namespace
metadata:
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-operator
  namespace: system
  labels:
    app.kubernetes.io/name: health-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: health-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: health-operator
    spec:
      serviceAccountName: app-health-operator
      containers:
        - name: manager
          image: controller:latest   # Replace with your image, e.g. myreg.io/health-operator:v1
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
          ports:
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
